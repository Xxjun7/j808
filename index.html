<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>jBox 計算器</title>
<link rel="icon" href="Jicon.ico" type="image/x-icon">
<style>
  body { 
    font-family: Arial, sans-serif; 
    background: #fff;   /* 網頁底色改白 */
    color: #000;        /* 文字顏色改黑，避免對比過低 */
  }
  #calculator-container {
    position: fixed;
    top: 0px;
    left: 0%;
    width: 180px;
    padding: 10px;
    background-color: rgba(0,0,0,0.7);  /* 半透明黑 */
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    z-index: 99999;
    user-select: none;
  }
  #calculator-container input {
    width: 100%;
    padding: 4px 6px;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    box-sizing: border-box;
    background-color: rgba(255,255,255,0.9); /* 白底輸入框更清楚 */
    color: #000; /* 輸入文字黑色 */
  }
  #calculator-container button {
    padding: 4px 8px;
    border: none;
    border-radius: 4px;
    background-color: #74abdb;
    color: white;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
  }
  #calculator-container button:hover { background-color: #659dcf; }
  #history-panel {
    display: none;
    max-height: 220px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.3;
    color: #eee;
    background-color: rgba(255,255,255,0.1);
    padding: 6px;
    border-radius: 6px;
    user-select: text;
    margin-top: 4px;
    word-break: break-word;
  }
  #toggle-history {
    width: 100%;
    text-align: center;
    margin: 6px auto 4px;
    padding: 2px 0;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    color: #74abdb;
    border-bottom: 1px solid #74abdb;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div id="calculator-container">
  <div id="calculator"></div>
  <div id="toggle-history">歷程記錄</div>
  <div id="history-panel"></div>
</div>

<script>
(function() {
'use strict';

const verificationUrl = 'https://xxjun7.github.io/jkey/';
const verificationText = 'j1 ok';
const container = document.getElementById('calculator');

// 歷程資料
let historyList = [];

// 驗證頁面
fetch(verificationUrl)
  .then(response => response.text())
  .then(html => {
    if (html.includes(verificationText)) {
      initCalculator();
    } else {
      alert('驗證失敗，無法啟動計算器');
    }
  })
  .catch(err => {
    console.error('驗證頁面抓取失敗:', err);
    alert('驗證頁面抓取失敗，無法啟動計算器');
  });

// 初始化計算器
function initCalculator() {
  const calc = document.createElement('div');

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = '輸入算式';

  const bottomRow = document.createElement('div');
  bottomRow.style.display = 'flex';
  bottomRow.style.justifyContent = 'space-between';
  bottomRow.style.alignItems = 'center';
  bottomRow.style.marginTop = '6px';

  const result = document.createElement('div');
  result.style.fontSize = '14px';
  result.style.flexGrow = '1';
  result.style.textAlign = 'left';
  result.style.wordBreak = 'break-word';
  result.style.color = '#fff';
  result.style.marginRight = '6px';
  result.style.minWidth = '0';

  const copyBtn = document.createElement('button');
  copyBtn.textContent = '複製';
  copyBtn.style.flexShrink = '0';

  bottomRow.appendChild(result);
  bottomRow.appendChild(copyBtn);

  calc.appendChild(input);
  calc.appendChild(bottomRow);

  container.appendChild(calc);

  const historyPanel = document.getElementById('history-panel');
  const toggleHistoryBtn = document.getElementById('toggle-history');
  toggleHistoryBtn.addEventListener('click', () => {
    historyPanel.style.display = historyPanel.style.display === 'none' ? 'block' : 'none';
  });
  historyPanel.addEventListener('dblclick', () => {
    historyList = [];
    renderHistory();
  });

  let currentResult = null;
  let clickCount = 0;
  let clickTimer = null;
  const clickTimeout = 600;

  // 三擊清空
  calc.addEventListener('click', (event) => {
    if (input.contains(event.target) || copyBtn.contains(event.target)) return;
    clickCount++;
    if (clickCount === 1) {
      clickTimer = setTimeout(() => { clickCount = 0; }, clickTimeout);
    } else if (clickCount === 3) {
      input.value = '';
      result.textContent = '';
      currentResult = null;
      clearTimeout(clickTimer);
      clickCount = 0;
    } else {
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, clickTimeout);
    }
  });

  function safeEval(expr) {
    const exprNoComma = expr.replace(/,/g, '');
    if (!/^[0-9+\-*/().\s]+$/.test(exprNoComma)) throw new Error('含有非法字元');
    return Function('"use strict";return (' + exprNoComma + ')')();
  }

  function formatWithCommas(num) {
    if (typeof num !== 'number' || isNaN(num)) return num;
    return num.toLocaleString('en-US', {maximumFractionDigits: 10});
  }

  input.addEventListener('input', () => {
    const expr = input.value.trim();
    if (expr === '') { result.textContent = ''; currentResult = null; return; }
    try {
      const value = safeEval(expr);
      result.textContent = (value === undefined) ? '' : '= ' + formatWithCommas(value);
      currentResult = (value === undefined) ? null : formatWithCommas(value);
    } catch (e) { result.textContent = '錯誤'; currentResult = null; }
  });

  function addHistory(expression, resultFormatted) {
    if (!expression || !resultFormatted) return;
    const entry = `${expression} = ${resultFormatted}`;
    if (historyList.length > 0 && historyList[0] === entry) return;
    historyList.unshift(entry);
    if (historyList.length > 30) historyList.pop();
    renderHistory();
  }

  function renderHistory() {
    historyPanel.textContent = '';
    historyList.forEach(line => {
      const div = document.createElement('div');
      div.textContent = line;
      div.style.padding = '2px 4px';
      div.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
      div.style.cursor = 'default';
      historyPanel.appendChild(div);
    });
  }

  function recordHistory() {
    if (!currentResult || input.value.trim() === '') {
      alert('目前沒有有效結果可紀錄');
      return false;
    }
    addHistory(input.value.trim(), currentResult);
    return true;
  }

  input.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      if (!recordHistory()) return;
      navigator.clipboard.writeText(`${input.value.trim()} = ${currentResult}`)
        .then(() => { copyBtn.textContent = '已複製！'; setTimeout(() => copyBtn.textContent='複製', 1500); })
        .catch(() => { alert('複製失敗'); });
    }
  });

  copyBtn.addEventListener('click', () => {
    if (!recordHistory()) return;
    navigator.clipboard.writeText(`${input.value.trim()} = ${currentResult}`)
      .then(() => { copyBtn.textContent = '已複製！'; setTimeout(() => copyBtn.textContent='複製', 1500); })
      .catch(() => { alert('複製失敗'); });
  });
}

})();
</script>

</body>
</html>
